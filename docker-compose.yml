services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    container_name: syllabus-backend
    restart: unless-stopped
    ports:
      - "8000:8000"
    volumes:
      # Preserve the SQLite database file
      - syllabus_db_data:/app/backend/
    
  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    container_name: syllabus-frontend
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      - backend

volumes:
  syllabus_db_data:
