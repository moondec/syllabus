services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    container_name: syllabus-backend
    restart: unless-stopped
    ports:
      - "8000:8000"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      # Preserve the SQLite database file in a dedicated directory
  #    - syllabus_db_data:/app/backend/data
      - ./backend:/app/backend/data
    
  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    container_name: syllabus-frontend
    restart: unless-stopped
    ports:
      - "8080:80"
    depends_on:
      - backend

volumes:
  syllabus_db_data:
